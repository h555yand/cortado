services:
  backend:
    #build:
    #    context: ./src/backend
    image: cortado-backend:1.0
    volumes:
      - ./src/backend/resources:/app/src/backend/resources
    expose:
      - "40000"

  frontend:
    #build:
    #    context: ./src/frontend
    image: cortado-frontend:1.0
    expose:
      - "4444"

  proxy:
    image: nginx:alpine
    ports:
      - "4444:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
